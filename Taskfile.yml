version: '3'

silent: true

tasks:

  build:
    desc: Builds in debug mode
    cmds:
      - cmd: cargo +stable build

  clean:
    desc: Cleans all targets
    cmds:
      - cmd: cargo +stable clean

  clippy:
    desc: Runs clippy for all targets
    cmds:
      - cmd: cargo +stable clippy --all-targets

  fmt:
    desc: Runs code formatter
    cmds:
      - cmd: cargo +nightly fmt

  install:
    desc: Installs preprocessor locally
    cmds:
      - cmd: cargo +stable install chain-inspector --path . --force

  uninstall:
    desc: Uninstalls preprocessor
    cmds:
      - cmd: cargo uninstall chain-inspector
